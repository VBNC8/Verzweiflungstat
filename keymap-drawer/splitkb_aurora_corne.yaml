  - ['&none', '@', µ, €, '&trans', '&trans', '&trans', Ü, \, Ö]
  - - '='
    - '&trans'
    - '&none'
    - Ä
    - {t: ß, s: '?'}
    - 🖱 RMB
    - 🖱 LMB
    - Ø
    - '&kp UP'
    - '&kp LEFT'
  - - '&kp DOWN'
    - '&kp RIGHT'
    - {t: +, s: '*'}
    - '&trans'
    - '&none'
    - ´
    - '&trans'
    - '&trans'
    - '&trans'
    - '&trans'
  - - '&trans'
    - '`'
    - '&trans'
    - '&trans'
    - '~'
    - '&trans'
    - ☻
    - {t: Task Mgr, type: held}
    - '&trans'
    - '&trans'
  - - {t: '&nbsp', type: held}
    - '&trans'
  adjust:
  - - '&none'
    - {t: '$$mdi:bluetooth$$', s: ☀ OFF}
    - ²
    - ³
    - '&trans'
    - '&trans'
    - '&trans'
    - '&trans'
    - '&trans'
    - '&trans'
  - - {t: ✕, s: Alt F4}
    - '&trans'
    - '&none'
    - {t: '$$mdi:bluetooth$$', h: PC, s: ⓵}
    - {t: '$$mdi:bluetooth$$', h: S8, s: ⓶}
    - {t: '$$mdi:bluetooth$$', h: Zbook, s: ⓷}
    - {t: '$$mdi:bluetooth$$', s: ⓸}
    - {t: '$$mdi:bluetooth$$', s: ⓹}
    - '&trans'
    - '&trans'
  - - '&trans'
    - '&trans'
    - '&trans'
    - '&trans'
    - '&none'
    - {t: ψ USB, s: ☀ ON}
    - '&ext_power EP_TOG'
    - '&ext_power EP_ON'
    - '&trans'
    - '&trans'
  - ['&trans', '&trans', ⏮, ⏭, '&trans', '&trans', '&kp F10', '&trans', '&trans', '&trans']
  - - '&trans'
    - {t: ' ', type: held}
  rgb:
  - ['&none', '&rgb_ug RGB_TOG', '&rgb_ug RGB_EFF', '&rgb_ug RGB_BRI', '&rgb_ug RGB_SAI', '&rgb_ug RGB_HUI', '&trans', '&trans', '&trans', '&trans']
