    - {t: '2', s: '"'}
    - {t: '3', s: §}
    - {t: '4', s: $}
    - {t: '5', s: '%'}
    - {t: '6', s: '&'}
    - {t: '7', s: /}
  - - {t: '8', s: (}
    - {t: '9', s: )}
    - {t: '0', s: '='}
    - '&trans'
    - '&none'
    - {t: <, s: '>'}
    - '&trans'
    - '|'
    - '&trans'
    - {t: '#', s: ''''}
