    - '&none'
    - '&kp A'
    - '&kp S'
    - {t: D, h: CTRL}
    - {t: F, h: Shift}
    - '&kp G'
    - '&kp H'
    - {t: J, h: Shift}
  - - {t: K, h: CTRL}
    - '&kp L'
    - {t: '-', s: _}
