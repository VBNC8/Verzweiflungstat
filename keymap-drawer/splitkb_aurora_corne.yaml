    - '&none'
    - '&kp Z'
    - {t: X, h: Alt}
    - '&kp C'
    - '&kp V'
    - '&kp B'
  - - '&kp N'
    - '&kp M'
    - '&kp COMMA'
    - {t: ., h: AltGr}
    - ⌦
    - '&none'
    - ⏯
    - {t: ESC, h: Raise, type: held}
    - {t: ⇥, h: Lower, type: held}
    - {t: ↵, h: Lower, type: held}
  - - {t: ␣, h: Raise, type: held}
    - {t: ⌫, h: Adjust, type: held}
  lower:
