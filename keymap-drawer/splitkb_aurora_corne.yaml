  - ['&trans', '&trans', '&trans', '&trans', '&none', '&trans', '&trans', '&trans', '&trans', '&trans']
  - ['&trans', '&trans', '&trans', '&trans', '&trans', '&trans', '&bt BT_CLR', '&trans', '&trans', '&trans']
  - ['&trans', '&trans']
