name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/splitkb_aurora_corne.keymap"
      - "config/keymap_drawer.config.yaml"
      - ".github/workflows/draw-keymap.yml"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install tree-sitter==0.21.3 keymap-drawer
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

      - name: Parse and Draw
        run: |
          # 1. Normal parsen (erzeugt keymap.yaml mit 42 Tasten)
          keymap -c config/keymap_drawer.config.yaml parse -z config/splitkb_aurora_corne.keymap > keymap.yaml

          # 2. Das Layout in der YAML Datei hart auf 5-Spalten (3x5_3) umbiegen
          # Wir löschen das alte Layout und setzen das neue crkbd 3x5_3 Layout
          yq -i '.layout = {"qmk_keyboard": "crkbd/rev1", "qmk_layout": "LAYOUT_split_3x5_3"}' keymap.yaml

          # 3. Zeichnen (Der Drawer nimmt jetzt nur die Tasten, die ins 5-Spalten-Raster passen)
          keymap -c config/keymap_drawer.config.yaml draw keymap.yaml > splitkb_aurora_corne.svg
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p keymap-drawer
          mv keymap.yaml keymap-drawer/
          mv splitkb_aurora_corne.svg keymap-drawer/
          git add keymap-drawer/*.yaml keymap-drawer/*.svg
          git commit -m "Update keymap drawer with RGB combo fix" || exit 0
          git push
