name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/splitkb_aurora_corne.keymap"
      - "config/keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tree-sitter==0.21.3 keymap-drawer PyYAML

      - name: Parse and Transform
        run: |
          # 1. Parsen (ignoriert erst mal, wo die Combos liegen)
          keymap -c config/keymap_drawer.config.yaml parse -z config/splitkb_aurora_corne.keymap > raw_keymap.yaml
          
          python3 - <<EOF
          import yaml
          with open('raw_keymap.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          # Layout-Wechsel auf das schmale 3x5_3
          data['layout'] = {'qmk_keyboard': 'crkbd/rev1', 'qmk_layout': 'LAYOUT_split_3x5_3'}
          
          # Randtasten löschen (42 -> 36)
          for layer in data['layers'].values():
              for idx in [35, 24, 23, 12, 11, 0]:
                  if len(layer['keys']) > idx:
                      layer['keys'].pop(idx)
          
          # Wir lassen die Combos einfach so, wie sie aus der .keymap kommen.
          # Da du dort <31 32> geschrieben hast, landen sie im 36er Layout 
          # jetzt exakt auf den Daumentasten.
          
          with open('keymap-drawer/keymap.yaml', 'w') as f:
              yaml.dump(data, f, sort_keys=False, allow_unicode=True)
          EOF

      - name: Draw SVG
        run: |
          keymap -c config/keymap_drawer.config.yaml draw keymap-drawer/keymap.yaml > keymap-drawer/splitkb_aurora_corne.svg

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add keymap-drawer/keymap.yaml keymap-drawer/splitkb_aurora_corne.svg
          git commit -m "Automated 3x5_3 crop and draw" || exit 0
          git push
