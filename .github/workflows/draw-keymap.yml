name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"
      - "config/keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse and Draw
        run: |
          # 1. Parse erzeugt die 42-Key YAML
          keymap -c config/keymap_drawer.config.yaml parse -z config/splitkb_aurora_corne.keymap > keymap.yaml
          
          # 2. Wir löschen die Rand-Indizes (0, 11, 12, 23, 24, 25, 35)
          # WICHTIG: Prüfe nochmal, ob wirklich genau 6 Tasten gelöscht werden, damit 36 übrig bleiben.
          yq -i '.layers[].[] |= (select(path[-1] | . == 0 or . == 11 or . == 12 or . == 23 or . == 24 or . == 25 or . == 35) = null)' keymap.yaml
          yq -i '.layers[].[] |= del(select(. == null))' keymap.yaml
          
          # 3. Wir setzen das Layout auf das generische 'corne'
          # Der Drawer erkennt bei 36 Tasten automatisch das 3x5 Layout
          yq -i '.layout = {"zmk_keyboard": "corne"}' keymap.yaml
          
          # 4. Zeichnen
          keymap -c config/keymap_drawer.config.yaml draw keymap.yaml > splitkb_aurora_corne.svg

      - name: Commit and push
        run: |
          mkdir -p keymap-drawer
          mv splitkb_aurora_corne.svg keymap-drawer/splitkb_aurora_corne.svg
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add keymap-drawer/*.svg
          git commit -m "Keymap Drawer: Randtasten entfernt & Config angewendet" || exit 0
          git push
