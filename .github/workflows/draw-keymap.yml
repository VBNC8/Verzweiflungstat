name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/handwired_left.keymap"
      - "config/keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tree-sitter==0.21.3 keymap-drawer PyYAML

      - name: Parse and Transform
        run: |
          # 1. Parsen (erzeugt raw_keymap.yaml mit 42 Tasten)
          keymap -c config/keymap_drawer.config.yaml parse -z config/handwired_left.keymap > raw_keymap.yaml
          
          python3 - <<EOF
          import yaml
          with open('raw_keymap.yaml', 'r') as f:
              data = yaml.safe_load(f)
          
          # Layout-Wechsel: 37-key custom layout (36 crkbd keys + EC11 encoder button)
          # The layout.json adds the encoder btn between the halves at x=5 y=1.75
          # (right of G/B column, vertically centered between rows 1 and 2)
          data['layout'] = {'qmk_info_json': 'keymap-drawer/layout.json'}
          
          # Definition der zu löschenden Indizes
          # Row0: 0 (LCol0), 11 (RCol0)
          # Row1: 12 (LCol0), 23 (RCol0)
          # Row2: 35 (EC11R encoder btn) — EC11L (24) is kept and moved to end (index 36)
          # 42 - 5 = 37 keys -> custom layout with encoder
          deleted_indices = [0, 11, 12, 23, 35]
          
          # 2. Layer-Tasten löschen (42 -> 37) und EC11L ans Ende verschieben
          layers = data.get('layers', {})
          for name, layer in layers.items():
              keys_list = layer if isinstance(layer, list) else layer.get('keys', [])
              for idx in sorted(deleted_indices, reverse=True):
                  if len(keys_list) > idx:
                      keys_list.pop(idx)
              # EC11L (originally at pos 24) is now at index 20 after the deletions above:
              # 4 indices smaller than 24 were removed (0, 11, 12, 23) => 24 - 4 = 20.
              # Move it to the end so it matches the encoder key at index 36 in layout.json.
              ec11l_new_idx = 24 - sum(1 for d in deleted_indices if d < 24)
              if len(keys_list) > ec11l_new_idx:
                  keys_list.append(keys_list.pop(ec11l_new_idx))
          
          # 3. NEU: Combos umrechnen
          # Damit Key-Position 15 (D) im 36er-Layout an Position 13 landet.
          # deleted_indices still drives the offset; EC11L (24) is moved not deleted,
          # which produces the same net shift for all non-encoder combo positions.
          if 'combos' in data:
              for combo in data['combos']:
                  new_positions = []
                  for pos in combo['p']:
                      # Wir zählen, wie viele gelöschte Tasten vor dieser Position lagen.
                      # pos is the original ZMK 42-key position.
                      offset = sum(1 for d in deleted_indices if d < pos)
                      # For positions originally after EC11L (original pos 24): add 1 more,
                      # because EC11L was moved to the end (not deleted), so it still
                      # occupies a slot that shifts everything behind it by 1 extra.
                      if pos > 24:
                          offset += 1
                      new_positions.append(pos - offset)
                  combo['p'] = new_positions
          
          import os
          os.makedirs('keymap-drawer', exist_ok=True)
          with open('keymap-drawer/keymap.yaml', 'w') as f:
              yaml.dump(data, f, sort_keys=False, allow_unicode=True)
          EOF
      - name: Draw SVG
        run: |
          keymap -c config/keymap_drawer.config.yaml draw keymap-drawer/keymap.yaml > keymap-drawer/handwired.svg

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add keymap-drawer/keymap.yaml keymap-drawer/handwired.svg
          git commit -m "Automated 3x5_3 crop and draw" || exit 0
          git push
