name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/splitkb_aurora_corne.keymap"
      - "config/keymap_drawer.config.yaml"
      - ".github/workflows/draw-keymap.yml"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install tree-sitter==0.21.3 keymap-drawer
          # yq ist auf GitHub Runnern meist vorinstalliert, aber sicher ist sicher:
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq && sudo chmod +x /usr/bin/yq

      - name: Parse, Inject and Draw
        run: |
          # 1. Erzeuge die keymap.yaml aus deiner ZMK-Keymap
          keymap -c config/keymap_drawer.config.yaml parse -z config/splitkb_aurora_corne.keymap > keymap.yaml
          
          # 2. Injektiere die Combo SAUBER in die YAML-Struktur (VOR dem Zeichnen)
          # Wir nutzen yq, um sicherzustellen, dass die Combo korrekt unter "combos" landet
          yq -i '.combos += [{"key_positions": [37, 40], "p": [175, 230], "type": "RGB"}]' keymap.yaml
          
          # 3. Jetzt das SVG basierend auf der manipulierten keymap.yaml zeichnen
          keymap -c config/keymap_drawer.config.yaml draw keymap.yaml > splitkb_aurora_corne.svg
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Wir verschieben die Dateien in den gewünschten Ordner, falls nötig
          mkdir -p keymap-drawer
          mv keymap.yaml keymap-drawer/
          mv splitkb_aurora_corne.svg keymap-drawer/
          git add keymap-drawer/*.yaml keymap-drawer/*.svg
          git commit -m "Update keymap drawer with RGB combo" || exit 0
          git push
