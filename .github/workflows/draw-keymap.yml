name: Draw ZMK keymaps
on:
  workflow_dispatch:  # Ermöglicht manuelles Starten
  push:
    paths:
      - "keymap-drawer/*.yaml" # Startet, wenn du die YAML händisch änderst
      - ".github/workflows/draw-keymap.yml"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install keymap-drawer
        run: pip install tree-sitter==0.21.3 keymap-drawer

      - name: Parse and Draw
        run: |
          # 1. Erzeuge die keymap.yaml
          keymap -c config/keymap_drawer.config.yaml parse -z config/splitkb_aurora_corne.keymap > keymap.yaml
          # 2. Zeichne das SVG
          keymap -c config/keymap_drawer.config.yaml draw keymap.yaml > splitkb_aurora_corne.svg
          
      - name: Inject Virtual Combo
        run: |
          # Wir fügen die Combo ans Ende der Datei an
          cat <<EOF >> keymap.yaml
          combos:
            - key_positions: [37, 40]
              p: [175, 230]
              type: "RGB"
          EOF
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add keymap-drawer/*.yaml keymap-drawer/*.svg
          git commit -m "Update keymap drawer" || exit 0
          git push
