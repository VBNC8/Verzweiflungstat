name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"
      - "config/keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse and Draw
        run: |
          # 1. Schritt: Ganz normaler Parse
          keymap -c config/keymap_drawer.config.yaml parse -z config/splitkb_aurora_corne.keymap > keymap.yaml
          
          # 2. Schritt: Wir löschen die Rand-Indizes direkt aus JEDEM Layer der YAML
          # Basierend auf deiner Liste: 0, 11, 12, 23, 24, 25, 35
          # Wir nutzen 'del', um die Einträge komplett zu entfernen
          yq -i '.layers[].[] |= (select(path[-1] | . == 0 or . == 11 or . == 12 or . == 23 or . == 24 or . == 25 or . == 35) = null)' keymap.yaml
          yq -i '.layers[].[] |= del(select(. == null))' keymap.yaml
          
          # 3. Schritt: Jetzt zeichnen wir (ohne das ZMK-Shield-Template zu erzwingen)
          # Wir nutzen --layout, um ihm ein generisches 3x10+3 Grid vorzugaukeln
          keymap -c config/keymap_drawer.config.yaml draw keymap.yaml > splitkb_aurora_corne.svg

      - name: Commit and push
        run: |
          mkdir -p keymap-drawer
          mv splitkb_aurora_corne.svg keymap-drawer/splitkb_aurora_corne.svg
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add keymap-drawer/*.svg
          git commit -m "Keymap Drawer: Randtasten entfernt & Config angewendet" || exit 0
          git push
