name: Draw ZMK keymaps
on:
  workflow_dispatch: # Erlaubt manuelles Starten
  push:
    paths:
      - "config/*.keymap" # Startet, wenn die Keymap geändert wird

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Erlaubt das Hochladen des Bildes ins Repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymap
        run: |
          # 1. Keymap parsen (Anpassen an deinen Dateinamen!)
          keymap parse -z config/splitkb_aurora_corne.keymap > keymap.yaml
          # 2. Diagramm zeichnen
          keymap -c config/keymap_drawer.config.yaml draw keymap.yaml > keymap.svg
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keymap.svg
          git commit -m "Update keymap visualization" || exit 0
          git push
