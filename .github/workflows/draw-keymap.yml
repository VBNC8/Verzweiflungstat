name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/splitkb_aurora_corne.keymap"
      - "config/keymap_drawer.config.yaml"
      - ".github/workflows/draw-keymap.yml"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install tree-sitter==0.21.3 keymap-drawer

      - name: Draw Only
        run: |
          # Zeichne direkt aus dem Ordner in den Ordner
          keymap -c config/keymap_drawer.config.yaml draw keymap-drawer/keymap.yaml > keymap-drawer/splitkb_aurora_corne.svg

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Wir brauchen kein 'mv' mehr, da die Datei schon im richtigen Ordner landet
          git add keymap-drawer/keymap.yaml keymap-drawer/splitkb_aurora_corne.svg
          git commit -m "Update keymap SVG from manual yaml" || exit 0
          git push
