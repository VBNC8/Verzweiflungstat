name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"
      - "config/keymap_drawer.config.yaml"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse and Draw
        run: |
          # 1. Schritt: Wir parsen mit skip_keys (Indizes aus deiner YAML)
          # Das erzeugt eine keymap.yaml, die nur 36 Tasten enthält.
          keymap -c config/keymap_drawer.config.yaml parse -z config/splitkb_aurora_corne.keymap --skip-keys 0 11 12 23 24 25 35 > keymap.yaml
          
          # 2. WICHTIG: Wir löschen die Layout-Info aus der YAML, bevor wir zeichnen!
          # Das zwingt den Drawer in den "Generic"-Modus.
          sed -i 's/layout: {zmk_keyboard: splitkb_aurora_corne}/layout: {qmk_keyboard: handwired\/ortho5x12}/' keymap.yaml
          
          # 3. Zeichnen
          keymap -c config/keymap_drawer.config.yaml draw keymap.yaml > splitkb_aurora_corne.svg

      - name: Commit and push
        run: |
          mkdir -p keymap-drawer
          mv splitkb_aurora_corne.svg keymap-drawer/splitkb_aurora_corne.svg
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add keymap-drawer/*.svg
          git commit -m "Keymap Drawer: Randtasten entfernt & Config angewendet" || exit 0
          git push
