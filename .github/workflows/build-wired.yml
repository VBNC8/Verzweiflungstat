name: Build RP2040 Wired
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-zmk-${{ hashFiles('**/west.yml') }}
          restore-keys: ${{ runner.os }}-zmk-

      - name: Initialize West
        run: west init -l config

      - name: Update West
        run: west update

      - name: Export Zephyr
        run: west zephyr-export

      - name: Build Left
        run: west build -s zmk/app -b rpi_pico -d build/left -- -DSHIELD="handwired_left" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"

      - name: Build Right
        run: west build -s zmk/app -b rpi_pico -d build/right -- -DSHIELD="handwired_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"

      - name: Package firmware
        run: |
          mkdir -p firmware
          cp build/left/zephyr/zmk.uf2 firmware/handwired_left.uf2
          cp build/right/zephyr/zmk.uf2 firmware/handwired_right.uf2

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/
