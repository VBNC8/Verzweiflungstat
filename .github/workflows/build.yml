steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: config # Checkt dein Repo in den Unterordner 'config' aus

      - name: West Init
        run: west init -m https://github.com/zmkfirmware/zmk --mr main .

      - name: West Update
        run: |
          # Erzwingt das Laden aller Module (auch nrf HAL!)
          west update
          west zephyr-export

      - name: Build Left
        run: west build -s app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right
        run: west build -p -s app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
