name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Left
        uses: zmkfirmware/zmk-action-build@v1
        with:
          board: nice_nano_v2
          shield: aurora_corne_left nice_view_adapter nice_view
      - name: Build Right
        uses: zmkfirmware/zmk-action-build@v1
        with:
          board: nice_nano_v2
          shield: aurora_corne_right nice_view_adapter nice_view
      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./*.uf2
