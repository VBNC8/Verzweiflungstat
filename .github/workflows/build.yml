name: Vertical Display
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout User Config
        uses: actions/checkout@v4
        with:
          path: config

      - name: Manual ZMK Setup
        run: |
          # 1. Wir kopieren die west.yml aus deinem config-Ordner ins Hauptverzeichnis
          cp config/west.yml .
          
          # 2. West mit der lokalen west.yml initialisieren
          west init -l .
          
          # 3. ZMK und alle Module (nRF etc.) klonen
          west update
          
          # 4. Zephyr Export, damit 'west build' erkannt wird
          west zephyr-export

      - name: Build Left
        run: |
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Left
        run: cp build/zephyr/zmk.uf2 left.uf2

      - name: Build Right
        run: |
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Right
        run: cp build/zephyr/zmk.uf2 right.uf2

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-erfolg-hoffentlich
          path: ./*.uf2
          
