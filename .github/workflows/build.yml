name: Vertical Display Success
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Wir lassen den Standard-Checkout ohne Pfad-Angabe

      - name: Manual ZMK Setup
        run: |
          # 1. Wir finden heraus, wo die west.yml wirklich ist und schieben sie in den Root
          find . -name "west.yml" -exec cp {} . \;
          
          # 2. West initialisieren mit der Datei direkt im Root
          west init -l .
          
          # 3. ZMK und Module laden
          west update
          west zephyr-export

      - name: Pfad-Check und Build
        run: |
          echo "--- Wo ist die App? ---"
          find . -maxdepth 3 -name "app" -type d
          
          # Wir suchen den Pfad automatisch
          REAL_APP_DIR=$(find . -name "app" -type d | grep "/app" | head -n 1)
          echo "Benutze Pfad: $REAL_APP_DIR"
          
          echo "--- Starte Build Left ---"
          west build -s "$REAL_APP_DIR" -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 left.uf2

          echo "--- Starte Build Right ---"
          west build -s "$REAL_APP_DIR" -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
