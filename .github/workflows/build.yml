name: Vertical Display
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout User Config
        uses: actions/checkout@v4
        with:
          path: config

      - name: Manual ZMK Clone
        run: |
          git clone https://github.com/zmkfirmware/zmk.git zmk
          cd zmk
          west init -l app/
          west update
          west zephyr-export

      - name: Build Left
        run: |
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right
        run: |
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save
        run: |
          cp build/zephyr/zmk.uf2 right.uf2
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-verzweiflung
          path: ./*.uf2
