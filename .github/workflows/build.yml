name: Vertical Display Success
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Wir lassen den Pfad weg, damit alles im Root landet

      - name: Manual Setup
        run: |
          git clone https://github.com/zmkfirmware/zmk.git zmk_workspace
          cd zmk_workspace
          west init -l app/
          west update
          # Das hier ist der entscheidende Befehl:
          west zephyr-export

      - name: Build Firmware
        run: |
          # Wir müssen West sagen, wo die Zephyr-Basis liegt, 
          # damit der 'build' Befehl registriert wird.
          export ZEPHYR_BASE=${GITHUB_WORKSPACE}/zephyr
          
          echo "Starte Build Left..."
          west build -s zmk_workspace/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          
          # UF2 wegsichern, bevor der zweite Build den Ordner überschreibt
          cp build/zephyr/zmk.uf2 left.uf2

          echo "Starte Build Right..."
          west build -s zmk_workspace/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          
          cp build/zephyr/zmk.uf2 right.uf2

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-corne
          path: ./*.uf2
