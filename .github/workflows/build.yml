name: RP2040 Wired Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr Export
        run: west zephyr-export

      # Build Left
      - name: Build Left
        run: west build -s zmk/app -b rpi_pico -d build/left -- -DSHIELD="handwired" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" -DSPLIT_ROLE="central"
      - name: Save Left
        run: cp build/left/zephyr/zmk.uf2 left.uf2
        
      # Build Right
      - name: Build Right
        run: west build -s zmk/app -b rpi_pico -d build/right -- -DSHIELD="handwired" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" -DSPLIT_ROLE="peripheral"
      - name: Save Right
        run: cp build/right/zephyr/zmk.uf2 right.uf2
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rp2040-corne-wired
          path: ./*.uf2
