name: Finaler-CAD-Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-cache
      - name: Install West
        run: pip3 install west
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr Export
        run: west zephyr-export
      - name: Build Left
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Build Right
        run: west build -p -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Export UF2
        run: |
          cp build/zephyr/zmk.uf2 left.uf2
          # Da wir nacheinander bauen, müssen wir das manuell schieben
          west build -p -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 right.uf2
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-cad-scroll
          path: ./*.uf2
