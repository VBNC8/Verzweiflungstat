name: Vertical Display
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Wir lassen 'path: config' weg, damit alles im Root landet

      - name: Manual ZMK Setup
        run: |
          west init -l .
          west update
          west zephyr-export
          # Kurz checken, wo wir sind (hilft bei Fehlern enorm)
          ls -d */ 

      - name: Build Left
        run: |
          # Wir probieren den Pfad 'app', falls 'zmk/app' nicht da ist
          [ -d "zmk/app" ] && APP_DIR="zmk/app" || APP_DIR="app"
          west build -s $APP_DIR -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right
        run: |
          [ -d "zmk/app" ] && APP_DIR="zmk/app" || APP_DIR="app"
          west build -s $APP_DIR -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
