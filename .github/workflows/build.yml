name: Vertical Display Success
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup and Build
        run: |
          # 1. ZMK Workspace vorbereiten
          git clone https://github.com/zmkfirmware/zmk.git zmk_workspace
          cd zmk_workspace
          
          # 2. West initialisieren und updaten
          west init -l app/
          west update
          west zephyr-export
          
          # 3. Umgebungsvariablen setzen (Ganz wichtig!)
          export ZEPHYR_BASE=$(pwd)/zephyr
          export PATH=$PATH:~/.local/bin
          
          # 4. Build Left
          echo "Building Left..."
          # Wir zeigen West explizit, wo die nice_nano Definitionen liegen
          west build -s app -p -b nice_nano_v2 -- \
            -Dboard_dir="$(pwd)/app/boards/arm/nice_nano_v2" \
            -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../left.uf2
          
          # 5. Build Right
          echo "Building Right..."
          west build -s app -p -b nice_nano_v2 -- \
            -Dboard_dir="$(pwd)/app/boards/arm/nice_nano_v2" \
            -DSHIELD="splitkb_aurora_corne_right" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-corne
          path: ./*.uf2
