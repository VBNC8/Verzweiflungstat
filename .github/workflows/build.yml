name: Vertical Display
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      - name: Build Left (Aurora Corne)
        # Wir löschen hier die Shields "nice_view_adapter" und "nice_view", 
        # damit ZMK nur deine manuelle Definition aus der Keymap nutzt.
        run: west build -p -s zmk/app -b nice_nano -- -DSHIELD="splitkb_aurora_corne_left" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Save Left
        run: cp build/zephyr/zmk.uf2 left.uf2

      - name: Build Right (Aurora Corne)
        run: west build -p -s zmk/app -b nice_nano -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Right
        run: cp build/zephyr/zmk.uf2 right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-cad-scroll
          path: ./*.uf2
