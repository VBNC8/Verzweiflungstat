name: Build Aurora Corne
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update
      - name: West Zephyr Export
        run: west zephyr-export
      - name: Build Left (mit Display)
        run: west build -s zmk/app -b nice_nano//zmk -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"
      - name: Save Left
        run: cp build/zephyr/zmk.uf2 left.uf2
      - name: Build Right (ohne Display)
        run: west build -p -s zmk/app -b nice_nano//zmk -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}"
      - name: Save Right
        run: cp build/zephyr/zmk.uf2 right.uf2
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: aurora-corne-firmware
          path: |
            left.uf2
            right.uf2
