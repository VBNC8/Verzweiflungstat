name: Vertical Display
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # KEIN "path: config" hier! Wir wollen die Dateien im Root.

      - name: West Init
        run: west init -l config # Sucht jetzt in ./config/west.yml - da liegt sie laut Bild!

      - name: West Update
        run: |
          west update
          west zephyr-export

      - name: Build Left
        run: |
          west build -s zmk/app -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right
        run: |
          west build -p -s zmk/app -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
