name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build Left
        run: |
          # Wir suchen den Pfad zum Board-Ordner manuell
          BOARD_DIR=$(find ${GITHUB_WORKSPACE}/zmk/app/boards -name "nice_nano_v2" -type d | head -n 1)
          echo "Benutze Board-Pfad: $BOARD_DIR"

          west build -s zmk/app -p -b nice_nano_v2 -- \
            -Dboard_dir="$BOARD_DIR" \
            -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 left.uf2

      - name: Build Right
        run: |
          BOARD_DIR=$(find ${GITHUB_WORKSPACE}/zmk/app/boards -name "nice_nano_v2" -type d | head -n 1)
          
          west build -s zmk/app -p -b nice_nano_v2 -- \
            -Dboard_dir="$BOARD_DIR" \
            -DSHIELD="splitkb_aurora_corne_right" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 right.uf2

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./*.uf2
