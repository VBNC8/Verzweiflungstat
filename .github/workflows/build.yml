name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Left
        run: |
          west init -l config
          west update
          west zephyr-export
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 left_side.uf2

      - name: Build Right
        run: |
          west build -p -s zmk/app -b nice_nano_v2 -- -DSHIELD="aurora_corne_right nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 right_side.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./*.uf2
