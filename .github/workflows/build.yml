name: Vertical Display
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Wir lassen 'path: config' weg, damit alles im Root landet

      - name: Manual ZMK Setup
        run: |
          # Wir suchen, wo die west.yml wirklich gelandet ist
          # Falls sie in 'config/west.yml' liegt, kopieren wir sie nach oben
          [ -f config/west.yml ] && cp config/west.yml . || echo "west.yml already in root or elsewhere"
          
          # West initialisieren
          west init -l .
          west update
          west zephyr-export

      - name: Build Left
        run: |
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right
        run: |
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
