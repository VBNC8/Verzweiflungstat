name: ZMK Wired Split Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      # ── Standalone left half (single controller, for testing without right side) ──
      - name: Build Standalone Left
        run: |
          west build -p -s zmk/app -b waveshare_rp2040_zero \
            -- -DSHIELD="handwired" \
               -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Standalone Left
        run: cp build/zephyr/zmk.uf2 handwired-standalone-left.uf2

      # ── Split left half (central, USB-connected) ──
      - name: Build Split Left
        run: |
          west build -p -s zmk/app -b waveshare_rp2040_zero \
            -- -DSHIELD="handwired_left" \
               -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Split Left
        run: cp build/zephyr/zmk.uf2 handwired-split-left.uf2

      # ── Split right half (peripheral) ──
      - name: Build Split Right
        run: |
          west build -p -s zmk/app -b waveshare_rp2040_zero \
            -- -DSHIELD="handwired_right" \
               -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Split Right
        run: cp build/zephyr/zmk.uf2 handwired-split-right.uf2

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rp2040-handwired-firmware
          path: ./*.uf2
