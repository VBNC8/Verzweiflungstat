name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (Left)
        run: |
          # Wir definieren den Pfad zum ZMK-Ordner absolut
          ZMK_ROOT="${GITHUB_WORKSPACE}/zmk"
          
          west build -p -s zmk/app -b nice_nano_v2 -- \
            -DBOARD_ROOT="$ZMK_ROOT" \
            -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 corne_left.uf2

      - name: West Build (Right)
        run: |
          ZMK_ROOT="${GITHUB_WORKSPACE}/zmk"
          
          west build -p -s zmk/app -b nice_nano_v2 -- \
            -DBOARD_ROOT="$ZMK_ROOT" \
            -DSHIELD="splitkb_aurora_corne_right" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 corne_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
        
