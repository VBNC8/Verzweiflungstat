name: Build ZMK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-zmk-${{ hashFiles('**/west.yml') }}
          restore-keys: ${{ runner.os }}-zmk-

      - name: Initialize West
        run: west init -l config

      - name: Update West
        run: west update

      - name: Export Zephyr
        run: west zephyr-export

      - name: Build Left
        run: west build -s zmk/app -b rpi_pico -d build/left -- -DSHIELD="handwired_left" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right
        run: west build -s zmk/app -b rpi_pico -d build/right -- -DSHIELD="handwired_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Upload Left firmware
        uses: actions/upload-artifact@v4
        with:
          name: left-firmware
          path: build/left/zephyr/zmk.uf2

      - name: Upload Right firmware
        uses: actions/upload-artifact@v4
        with:
          name: right-firmware
          path: build/right/zephyr/zmk.uf2
