name: Vertical Display
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout User Config
        uses: actions/checkout@v4
        with:
          path: config

      - name: Manual ZMK Setup
        run: |
          # 1. ZMK klonen
          git clone https://github.com/zmkfirmware/zmk.git zmk
          # 2. West im aktuellen Ordner initialisieren
          west init -l config
          # 3. Alle Module (nRF, Zephyr etc.) holen
          west update
          # 4. WICHTIG: West sagen, wo Zephyr liegt
          west zephyr-export

      - name: Build Left
        run: |
          # Wir nutzen den absoluten Pfad zum West-Befehl im ZMK-Kontext
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Left
        run: cp build/zephyr/zmk.uf2 left.uf2

      - name: Build Right
        run: |
          west build -s zmk/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Save Right
        run: cp build/zephyr/zmk.uf2 right.uf2

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware-final-test
          path: ./*.uf2
          
