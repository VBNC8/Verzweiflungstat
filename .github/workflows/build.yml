name: Vertical Display Success
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: config

      - name: Manual Setup
        run: |
          # 1. ZMK manuell klonen (da wissen wir, wo es ist!)
          git clone https://github.com/zmkfirmware/zmk.git zmk_workspace
          
          # 2. In den Ordner gehen und West dort initialisieren
          cd zmk_workspace
          west init -l app/
          
          # 3. Deine west.yml rüberkopieren, damit er die Shields/Module findet
          cp ../config/west.yml bootloader_west.yml # nur zur Sicherheit
          
          # 4. West Update (holt Zephyr und nRF-Boards)
          west update
          west zephyr-export

      - name: Build Left
        run: |
          # Wir bauen direkt aus dem manuell geklonten Ordner
          west build -s zmk_workspace/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 left.uf2

      - name: Build Right
        run: |
          west build -s zmk_workspace/app -p -b nice_nano_v2 -- \
          -DSHIELD="splitkb_aurora_corne_right" \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 right.uf2

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./*.uf2
