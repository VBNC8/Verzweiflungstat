# --- DISPLAY ---
CONFIG_ZMK_DISPLAY=y
# Wichtig: Wir schalten das WPM-Widget explizit aus, da es oft 
# Berechnungs-Loops verursacht, die das System einfrieren.
CONFIG_ZMK_WPM_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
# Diese Queue sorgt dafür, dass das Display den Haupt-Thread nicht blockiert
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# --- ENCODER (Der potenzielle Übeltäter) ---
# Falls der Encoder falsch verkabelt ist oder die Keymap 
# ins Leere greift, friert ZMK beim Booten ein.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- POWER & USB ---
CONFIG_ZMK_EXT_POWER=y
# Zwingt die Tastatur, sich sofort am USB zu melden
CONFIG_ZMK_USB=y
