# --- RETTUNGS-SETUP (Minimalistisch) ---
CONFIG_ZMK_DISPLAY=y
CONFIG_NICE_VIEW_WIDGET_STATUS=y

# Maus-Support (Aber OHNE USB_BOOT!)
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# Encoder & RGB (Standard)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# LÖSCHE DIESE ZEILEN (Falls noch vorhanden):
# CONFIG_ZMK_USB_BOOT=y  <-- DER HAUPTVERDÄCHTIGE
# CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y <-- Kann Boot-Loops verursachen
