# Maus-Funktionen für Scrollen
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# Erzwingt die USB-Maus-Meldung beim Host
CONFIG_ZMK_USB_BOOT=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Verbindung optimieren
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- DISPLAY WIEDERBELEBUNG ---
CONFIG_ZMK_DISPLAY=y

# Das Haupt-Widget des Shields muss AN sein, sonst bleibt es schwarz
CONFIG_NICE_VIEW_WIDGET_STATUS=y

# Wir schalten die DATEN-Zufuhr für den Graphen ab, nicht das Widget selbst
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# Falls es immer noch dunkel bleibt, erzwingen wir das Standard-Layout
# (Manche Versionen brauchen das als Fallback)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y 
