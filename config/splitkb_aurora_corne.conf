# Maus-Funktionen für Scrollen
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# Erzwingt die USB-Maus-Meldung beim Host
CONFIG_ZMK_USB_BOOT=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Verbindung optimieren
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- DISPLAY FIX (Linker Error Edition) ---
CONFIG_ZMK_DISPLAY=y

# 1. DEAKTIVIERE alle Standard-Widgets (Wichtig!)
# Das Shield bringt diese Funktionen selbst mit.
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# --- DISPLAY KONFIGURATION ---
CONFIG_ZMK_DISPLAY=y

# 1. Das Shield-spezifische Widget AUS (beendet den Graphen-Zwang)
CONFIG_NICE_VIEW_WIDGET_STATUS=n

# 2. Den nativen ZMK Status-Screen EIN (kein Graph vorhanden)
# Wir lassen das "BUILTIN" Symbol weg, da es in manchen Versionen Probleme macht
# Stattdessen aktivieren wir einfach die Standard-Widgets einzeln:
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# 3. WPM komplett deaktivieren (Kein 'n'-'y' Konflikt mehr)
# Wir setzen es NICHT auf 'n', sondern löschen die Zeilen einfach,
# damit das System den Standard (aus) wählt oder es ignoriert.
