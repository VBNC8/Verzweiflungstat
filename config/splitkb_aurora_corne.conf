# Maus-Funktionen für Scrollen
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# Erzwingt die USB-Maus-Meldung beim Host
CONFIG_ZMK_USB_BOOT=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Verbindung optimieren
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- DISPLAY FIX (Linker Error Edition) ---
CONFIG_ZMK_DISPLAY=y

# 1. DEAKTIVIERE alle Standard-Widgets (Wichtig!)
# Das Shield bringt diese Funktionen selbst mit.
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# 2. AKTIVIERE das Shield-eigene System
CONFIG_NICE_VIEW_WIDGET_STATUS=y

# 3. Batterie-Logik (für den Hintergrund)
# Wir erlauben ZMK die Batterie zu messen, aber ohne das Widget zu bauen.
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Deaktiviert die WPM-Zufuhr komplett
CONFIG_ZMK_WPM=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
# Spezifisch für manche nice!view Versionen
CONFIG_NICE_VIEW_WIDGET_WPM_STATUS=n
