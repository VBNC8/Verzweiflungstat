# --- DISPLAY ---
CONFIG_ZMK_DISPLAY=y
# Wir lassen NICE_VIEW_WIDGET_STATUS erst mal weg, 
# da das Shield nicht im Build-Befehl steht.

# --- RGB (Die neuen Namen für Zephyr 4.x) ---
CONFIG_ZMK_RGB_UNDERGLOW=y
# WS2812_STRIP gibt es so oft nicht mehr direkt, 
# meist wird es über den SPI-Treiber oder LED_STRIP gelöst:
CONFIG_LED_STRIP=y

# --- MAUS & ENCODER ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- FEHLER-FIX ---
# Wir schalten die Standard-Widgets aus, damit es keine Warnungen gibt
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
