# Batteriemessung
#CONFIG_ZMK_BATTERY_REPORTING=y

# --- CORE ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SLEEP=y

# --- DISPLAY AUS (WICHTIG) ---
# Wir deaktivieren alles, was mit dem Display zu tun hat, 
# damit die Pins für die Matrix frei werden.
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n

# --- LED HARDWARE ---
# Wir aktivieren den Strip, aber noch ohne komplettes Underglow-Menü
CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
# WICHTIG: EXT_POWER auf 'n', um den Fehler von vorhin zu vermeiden
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# --- LED STARTUP ---
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
