# --- DISPLAY & WIDGETS ---
CONFIG_ZMK_DISPLAY=y
# Das nice!view Shield-Widget (erfordert das Shield im Build-Befehl!)
CONFIG_NICE_VIEW_WIDGET_STATUS=y

# Deaktiviere Standard-Widgets, um Linker-Konflikte zu vermeiden
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# --- MAUS & ENCODER ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- RGB UNDERGLOW ---
CONFIG_ZMK_RGB_UNDERGLOW=y
# Neuer Standard für Zephyr 4.x statt WS2812_STRIP
CONFIG_LED_STRIP=y

# --- VERBINDUNG & POWER ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Verhindert, dass das Display den Bootvorgang blockiert
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
