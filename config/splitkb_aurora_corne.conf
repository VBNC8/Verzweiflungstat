# --- POINTING ---
# CONFIG_ZMK_MOUSE was removed in ZMK main; CONFIG_ZMK_POINTING replaces it.
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
CONFIG_ZMK_USB_BOOT=y

# --- ENCODER ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- VERBINDUNG ---
# Höhere Sendeleistung hilft gegen Funk-Aussetzer zwischen den Hälften
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- BATTERIE ---
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- DISPLAY (nice!view) ---
CONFIG_ZMK_DISPLAY=y

# DISABLE standard battery and output widgets (replaced by custom split battery widget)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n

# DISABLE nice!view-specific widget to use our custom split battery status screen
CONFIG_NICE_VIEW_WIDGET_STATUS=n

# ENABLE layer status widget for our custom status screen
CONFIG_ZMK_WIDGET_LAYER_STATUS=y

# Enable font used by our custom status screen labels
CONFIG_LV_FONT_MONTSERRAT_12=y

# Dedicated work queue for display updates
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
