# Encoder aktivieren (Dein Drehrad)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Bluetooth Power (Die neue Schreibweise für starken Empfang)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Alles was stören könnte auf 'n', aber nur wenn sie existieren
# Wir lassen die problematischen 'n' Zeilen einfach weg, 
# da 'n' ohnehin der Standard ist, wenn man nichts schreibt.

# Stromsparen
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Maus/Pointing sicherheitshalber aus
CONFIG_ZMK_MOUSE=n
CONFIG_ZMK_POINTING=n

# Modul aktivieren
CONFIG_ZMK_BATTERY_STATUS_LED=y

# Schwellenwert: Ab 15% fängt sie an zu warnen
CONFIG_ZMK_BATTERY_STATUS_LED_LOW_LEVEL_THRESHOLD=15

# Wie soll sie warnen? (Blinken ist meistens besser sichtbar)
CONFIG_ZMK_BATTERY_STATUS_LED_LOW_LEVEL_BLINK=y
