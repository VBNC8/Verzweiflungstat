# --- BASIS SYSTEM ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORTING_INTERVAL=60
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- LED HARDWARE (SPI) ---
# Aktiviert den Treiber für die SK6812/WS2812 LEDs
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y

# --- SIDE INDICATOR / STATUS LED ---
# Diese Optionen bereiten ZMK darauf vor, LEDs für Statusmeldungen zu nutzen
# anstatt für dauerhaftes Leuchten.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Verhindert, dass die LEDs beim Starten sofort in einem Effekt-Modus landen
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
