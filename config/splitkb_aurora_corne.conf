# Bluetooth Sendeleistung auf Maximum (Kupfer-Gehäuse!)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Encoder (Drehrad)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Stromsparen (30 Min Timeout)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Maus-Support explizit aus, um Compile-Fehler zu vermeiden
CONFIG_ZMK_MOUSE=n
CONFIG_ZMK_POINTING=n

# Stromsteuerung aktivieren
CONFIG_ZMK_EXT_POWER=y

# Batteriemessung aus, damit Pin 29 frei bleibt
CONFIG_ZMK_BATTERY_REPORTING=n
