# Bluetooth Sendeleistung auf Maximum (Kupfer-Gehäuse!)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Encoder (Drehrad)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Stromsparen (30 Min Timeout)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# RGB Underglow / Per-Key aktivieren (Das ist jetzt unser Licht-System)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
# Start-Einstellungen: Solid Color, 50% Helligkeit
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=50

# Batteriemessung wieder AN (da Pin 29 jetzt frei ist!)
CONFIG_ZMK_BATTERY_REPORTING=y
