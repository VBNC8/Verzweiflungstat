# --- POINTING ---
# CONFIG_ZMK_MOUSE was removed in ZMK main; CONFIG_ZMK_POINTING replaces it.
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
CONFIG_ZMK_USB_BOOT=y

# --- ENCODER ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- VERBINDUNG ---
# Standard TX-Leistung (0 dBm) statt +8 dBm spart deutlich Energie.
# Bei Verbindungsproblemen kann auf PLUS_4 oder PLUS_8 erhöht werden.
CONFIG_BT_CTLR_TX_PWR_0=y

# --- ENERGIESPAREN ---
# Nach 30 s Inaktivität BLE-Aktivität reduzieren (Standard-ZMK-Wert).
CONFIG_ZMK_IDLE_TIMEOUT=30000
# Nach 10 min Inaktivität in tiefen Schlaf wechseln (Standard: 15 min).
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# --- BATTERIE ---
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- DISPLAY (nice!view) ---
CONFIG_ZMK_DISPLAY=y

# DISABLE diese Standard-Widgets (sie verursachen den Fehler!)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n

# ENABLE das nice!view-spezifische Widget
CONFIG_NICE_VIEW_WIDGET_STATUS=y

# Hilfreich für die Performance
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
