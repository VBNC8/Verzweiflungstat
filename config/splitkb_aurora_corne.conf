# --- POINTING (ZMK main — CONFIG_ZMK_MOUSE was removed, use CONFIG_ZMK_POINTING) ---
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# Erzwingt die USB-Maus-Meldung beim Host
CONFIG_ZMK_USB_BOOT=y

# --- ENCODER ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- RGB Underglow ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# --- VERBINDUNG ---
# Höhere Sendeleistung hilft gegen Funk-Aussetzer zwischen den Hälften
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- BATTERIE ---
# Erlaubt dem RP2040 (oder nice!nano), den Ladestand per ADC zu messen
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_BATTERY_REPORTING=y
# Die linke (Central) Seite holt den Akkustand der rechten (Peripheral) Seite
# über BLE ab und stellt ihn dem Host (PC/BLE-Profil) zur Verfügung
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- DISPLAY (nice!view) ---
CONFIG_ZMK_DISPLAY=y

# Standard-Widgets deaktivieren (das nice!view-Widget ersetzt sie)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# Das nice!view-eigene Status-Widget aktivieren
CONFIG_NICE_VIEW_WIDGET_STATUS=y

# Dedizierter Work-Queue verhindert, dass das Display das System ausbremst
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
