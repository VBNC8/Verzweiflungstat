# Maus komplett aus für den ersten sauberen Build
CONFIG_ZMK_MOUSE=n
CONFIG_ZMK_POINTING=n

# Encoder (Dein Drehrad am Kupferkeil)
CONFIG_EC11=y

# RGB & Display (Absolut tot)
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_DISPLAY=n
CONFIG_NICE_VIEW_WIDGET_STATUS=n

# Stromsparen
CONFIG_ZMK_SLEEP=y
# 30 Minuten bis zum Deep Sleep (1800000 ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
