# --- MAUS & SCROLLEN (Das Ziel) ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# --- ENCODER ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- DISPLAY (Minimal-Modus) ---
CONFIG_ZMK_DISPLAY=y
# Verhindert, dass ein hängendes Display den Rest der Tastatur mit in den Abgrund reißt
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# --- FUNK-STABILITÄT (Für die rechte Seite) ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Zwingt die Hälften zur Kommunikation
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# --- SYSTEM ---
CONFIG_ZMK_USB=y
CONFIG_ZMK_EXT_POWER=y
