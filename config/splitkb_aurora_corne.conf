# --- MAUS & POINTING ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
CONFIG_ZMK_USB_BOOT=y

# --- ENCODER ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- VERBINDUNG ---
# Höhere Sendeleistung hilft gegen Funk-Aussetzer zwischen den Hälften
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- DISPLAY (nice!view) ---
# Da du es loswerden willst, lassen wir es auf Sparflamme mitlaufen, 
# damit der Build nicht wegen fehlender Display-Referenzen meckert.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_NICE_VIEW_WIDGET_STATUS=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# --- BATTERIE ---
CONFIG_ZMK_BATTERY_REPORTING=y
# Wichtig für Wireless-Splits: Master fragt Slave nach Akkustand
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- STROMSTEUERUNG (VCC für Display & LEDs) ---
CONFIG_ZMK_EXT_POWER=y

# --- RGB UNDERGLOW & STRIP ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Verhindert, dass ZMK die LEDs softwareseitig ausschaltet, wenn der Strom gekappt wird.
# Das ist der Schlüssel, damit das Makro funktioniert!
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Strom sparen: LEDs nach 15 Minuten Inaktivität aus
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Start-Zustand (y = an beim Einschalten, n = aus)
# Da wir es über das Makro steuern, setzen wir es auf 'n' für maximalen Akku
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
