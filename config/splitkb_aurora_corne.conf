# Maus-Funktionen für Scrollen
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# Erzwingt die USB-Maus-Meldung beim Host
CONFIG_ZMK_USB_BOOT=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB Underglow
#CONFIG_ZMK_RGB_UNDERGLOW=n
#CONFIG_WS2812_STRIP=n

# Verbindung optimieren
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_DISPLAY=y

# 1. DEAKTIVIERE alle Standard-Widgets (Wichtig!)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n

CONFIG_NICE_VIEW_WIDGET_STATUS=y

# Dieser Befehl hilft, dass das Display nicht das ganze System ausbremst
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

CONFIG_ZMK_BATTERY_REPORTING=y
# Falls du es wirklich ändern willst (Standard ist 60):
# CONFIG_ZMK_BATTERY_REPORTING_RE_INTERVAL=60

# --- STROMSTEUERUNG (VCC für Display & LEDs) ---
CONFIG_ZMK_EXT_POWER=y
# nimmt er nicht: CONFIG_ZMK_EXT_POWER_BOOT_ON=y

# --- RGB UNDERGLOW ---
CONFIG_ZMK_RGB_UNDERGLOW=y
# Wir nutzen den Strip-Treiber
CONFIG_WS2812_STRIP=y

# RGB Einstellungen
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
