# --- MAUS & TRACKPAD ---
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
# USB Boot Protocol AUS (wichtig für Stabilität)
CONFIG_ZMK_USB_BOOT=n

# --- DISPLAY (Links) ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
# Nice!View spezifisch
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_NICE_VIEW_WIDGET_STATUS=y

# --- ENCODER (Links) ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- BLUETOOTH & SPLIT SYNC ---
# Erhöhte Sendeleistung gegen Verbindungsabbrüche
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Optimiertes Intervall für Mausdaten über Funk
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
# Experimental Conn hilft oft bei Verbindungsfehlern
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# --- POWER MANAGEMENT ---
# Erlaubt dem Display und Trackpad Strom zu ziehen
CONFIG_ZMK_EXT_POWER=y
