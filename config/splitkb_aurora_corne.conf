# --- BASIS SYSTEM ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- LED HARDWARE ---
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_LED_STRIP=n

# --- FIX FÜR DEN COMPILER-FEHLER ---
# Wir schalten die Software-Steuerung für den externen Strom AUS.
# Die LEDs hängen beim Aurora ohnehin direkt am VCC/RAW.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# --- STARTUP BEHAVIOR ---
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
