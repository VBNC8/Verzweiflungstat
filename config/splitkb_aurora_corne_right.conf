# Bluetooth aktivieren
CONFIG_ZMK_BLE=y

# Display explizit aus für die rechte Seite
CONFIG_ZMK_DISPLAY=n

# Maus-Support aktivieren
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# SPI für das Trackpad
CONFIG_SPI=y
CONFIG_INPUT=y

# Erzwinge die Rolle als Peripheriegerät (Rechts)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Bluetooth-Sendeleistung erhöhen (hilft bei Verbindungsproblemen)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Das hier ist oft der "Goldene Griff":
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Aktiviert das Logging über USB
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y

# Speziell für unseren Pinnacle-Treiber (da wir LOG_MODULE_REGISTER nutzen)
CONFIG_CAN_LOG_LEVEL_DBG=y
