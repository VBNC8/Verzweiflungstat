# Bluetooth aktivieren
CONFIG_ZMK_BLE=y

# Display explizit aus für die rechte Seite
CONFIG_ZMK_DISPLAY=n

# Maus-Support aktivieren
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# SPI für das Trackpad
CONFIG_SPI=y
CONFIG_INPUT=y

# Die Sendeleistung (damit rechts auch links findet)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USB-Logging aktivieren
CONFIG_ZMK_USB_LOGGING=y
# Mehr Details beim Starten
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=2000
