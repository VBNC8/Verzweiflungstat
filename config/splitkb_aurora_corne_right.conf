# Bluetooth aktivieren
CONFIG_ZMK_BLE=y

# Display explizit aus für die rechte Seite
CONFIG_ZMK_DISPLAY=n

# Maus-Support aktivieren
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# SPI für das Trackpad
CONFIG_SPI=y
CONFIG_INPUT=y

# Erzwinge die Rolle als Peripheriegerät (Rechts)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Bluetooth-Sendeleistung erhöhen (hilft bei Verbindungsproblemen)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Das hier ist oft der "Goldene Griff":
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Logging aktivieren, aber ZMK-USB-Logik umgehen
CONFIG_LOG=y
CONFIG_ZMK_LOGGING_MINIMAL=y

# Das hier erzwingt USB CDC ACM (Serial) auch auf der rechten Seite
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_LOG_LEVEL_INF=y

# Konsole auf USB umleiten
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
