# Bluetooth aktivieren
CONFIG_ZMK_BLE=y

# Display explizit aus für die rechte Seite
CONFIG_ZMK_DISPLAY=n

# Maus-Support aktivieren
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# SPI für das Trackpad
CONFIG_SPI=y
CONFIG_INPUT=y

# Erzwinge die Rolle als Peripheriegerät (Rechts)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Bluetooth-Sendeleistung erhöhen (hilft bei Verbindungsproblemen)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Das hier ist oft der "Goldene Griff":
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Basiseinstellungen für USB-Logging
CONFIG_ZMK_LOGGING=y
CONFIG_LOG=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="AuroraCorneRight"

# Damit wir wirklich ALLES sehen (auch Zephyr-Boot-Infos)
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BUFFER_SIZE=2048
