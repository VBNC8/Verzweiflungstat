draw_config:
  dark_mode: true
  n_columns: 1
  svg_style: |
    /* 1. L├ûSCH-FILTER (F15-Tasten physisch entfernen) */
    g.key.remove_me {
      display: none !important;
    }

    /* 2. SCHRIFTART-BASIS */
    svg {
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
    }

    /* 3. FARBE WIEDERHERSTELLEN (Wei├şer Text) */
    text {
      fill: #ffffff !important; /* Erzwingt wei├şen Text f├╝r den Dark Mode */
    }

    /* 4. VERTIKALE ZENTRIERUNG (Begradigen) */
    text {
      text-anchor: middle;
      dominant-baseline: central; /* R├╝ckt die Buchstaben wieder in die Mitte */
    }

    /* 3. Die Symbole oben und unten gezielt ansprechen */
    /* .top = Symbole oben (Shift), .bottom = Symbole unten (AltGr) */
    text.top, text.bottom, text.side {
      font-size: 4px !important;  /* 4px war VIEL zu klein, man sieht nichts mehr */
      fill: #bbbbbb !important;  /* Etwas grauer, damit sie nicht vom Hauptzeichen ablenken */
    }
    /* 4. Position korrigieren (Vermeidet das "Kleben" am Rand) */
    text.top { transform: translateY(10px); }
    text.bottom { transform: translateY(-10px); }
