
parse_config:
  check_side_key_usage: true
  skip_binding_parsing: false
  columns: 10
  raw_binding_map:
    "&trans": " "           # Macht &trans komplett leer/unsichtbar
    "&none": " "            # Macht &none komplett leer/unsichtbar
    
    # --- LAYER KEYS (ROT) ---
    "&lt 1 TAB": {t: "вҮҘ", h: "Lower", type: "held"}
    "&lt 1 RET": {t: "вҶө", h: "Lower", type: "held"}
    "&lt 2 ESC": {t: "ESC", h: "Raise", type: "ghost"}
    "&lt_hp 2 SPACE": {t: "вҗЈ", h: "Raise", type: "held"}
    "&lt_hp 3 BSPC": {t: "вҢ«", h: "Adjust", type: "held"}
    "&mo 1": {t: "Lower", type: "held"}
    "&mo 2": {t: "Raise", type: "held"}
    "&mo 3": {t: "Adjust", type: "held"}
    "&kp HOME": {t: "вӨ’ Pos1", type: "held"}
    "&kp END": {t: "вӨ“ End", type: "held"}
    "&kp LC(LS(ESC))": {t: "Task Mgr", type: "held"}
    "&nbsp": {t: "&nbsp", type: "held"}
    "&kp F12": {t: " ", type: "held"}

    # --- SYMBOLE & NAVIGATION ---
    
    "&kp BSPC": "вҢ«"
    "&kp DEL": "вҢҰ"
    "&kp LGUI": "$$mdi:microsoft-windows-classic$$"
    "&kp GRAVE": {t: "^", s: "В°"}
    "&kp PLUS": "`"

    # --- ZAHLEN & UMLAUTE ---
    "&kp N1": {t: "1", s: "!"}
    "&kp N2": {t: "2", s: "\""}
    "&kp N3": {t: "3", s: "В§"}
    "&kp N4": {t: "4", s: "$"}
    "&kp N5": {t: "5", s: "%"}
    "&kp N6": {t: "6", s: "&"}
    "&kp N7": {t: "7", s: "/"}
    "&kp N8": {t: "8", s: "("}
    "&kp N9": {t: "9", s: ")"}
    "&kp N0": {t: "0", s: "="}
    "&kp MINUS": {t: "Гҹ", s: "?"}
    "&kp SEMI": "Г–"
    "&kp SQT": "Г„"
    "&kp LBKT": "Гң"
    "&kp RA(N7)": "{"
    "&kp RA(N8)": "["
    "&kp RA(N9)": "]"
    "&kp RA(N0)": "}"
    "&kp RA(Q)": "@"
    "&kp RA(E)": "вӮ¬"
    "&kp RA(M)": "Вө"
    "&kp RA(MINUS)": "\\"
    "&kp RA(SQT)": "Вҙ"
    "&kp RA(NON_US_BSLH)": "|"
    "&kp RA(RBKT)": "~"
    "&kp RA(N2)": "ВІ"
    "&kp RA(N3)": "Ві"
    "&kp NON_US_HASH": {t: "#", s: "'"}
    "&kp NON_US_BSLH": {t: "<", s: ">"}
    "&kp SLASH": {t: "-", s: "_"}
    "&kp RPAR": "="
    "&kp RBKT": {t: "+", s: "*"}

    # --- SYSTEM & BT ---
    "&usb_on": {t: "ПҲ USB", s: "вҳҖ ON"}
    "&bt_off": {t: "$$mdi:bluetooth$$", s: "вҳҖ OFF"}
    "&bt BT_SEL 0": {t: "$$mdi:bluetooth$$", s: "в“ө", h: "PC"}
    "&bt BT_SEL 1": {t: "$$mdi:bluetooth$$", s: "в“¶", h: "S8"}
    "&bt BT_SEL 2": {t: "$$mdi:bluetooth$$", s: "в“·", h: "Zbook"}
    "&bt BT_SEL 3": {t: "$$mdi:bluetooth$$", s: "в“ё"}
    "&bt BT_SEL 4": {t: "$$mdi:bluetooth$$", s: "в“№"}
    "&kp LA(F4)": {t: "вң•", s: "Alt F4"}

    # --- SONSTIGES ---
    "&smiley": "вҳ»"
    "&durchmesser": "Гҳ"
    "&kp C_PREV": "вҸ®"
    "&kp C_NEXT": "вҸӯ"
    "&kp C_PP": "вҸҜ"
    "&mkp LCLK": "рҹ–ұ LMB"
    "&mkp RCLK": "рҹ–ұ RMB"

    # --- MODIFIERS ---
    "&hrm_safe LCTRL D": {t: "D", h: "CTRL"}
    "&hrm_shift LSHIFT F": {t: "F", h: "Shift"}
    "&hrm_shift RSHIFT J": {t: "J", h: "Shift"}
    "&hrm_safe RCTRL K": {t: "K", h: "CTRL"}
    "&hrm_safe LALT X": {t: "X", h: "Alt"}
    "&hrm_safe RALT DOT": {t: ".", h: "AltGr"}
    
    # --- RGB UNTERBELEUCHTUNG ---
    "&rgb_ug RGB_TOG": {t: "$$mdi:lightbulb-on$$", s: "OnOff"}
    "&rgb_ug RGB_EFF": {t: "$$mdi:cosine-wave$$", s: "Mode"}
    "&rgb_ug RGB_EFR": {t: "$$mdi:cosine-wave$$", s: "Rev"}
    "&rgb_ug RGB_BRI": {t: "$$mdi:brightness-7$$", s: "Bri+"}
    "&rgb_ug RGB_BRD": {t: "$$mdi:brightness-4$$", s: "Bri-"}
    "&rgb_ug RGB_SAI": {t: "$$mdi:palette$$", s: "Sat+"}
    "&rgb_ug RGB_SAD": {t: "$$mdi:palette-outline$$", s: "Sat-"}
    "&rgb_ug RGB_HUI": {t: "$$mdi:palette-swatch$$", s: "Hue+"}
    "&rgb_ug RGB_HUD": {t: "$$mdi:palette-swatch-outline$$", s: "Hue-"}

    # --- BLUETOOTH & SYSTEM ---
    "&bt BT_CLR": {t: "$$mdi:bluetooth-off$$", s: "CLR"}
    "&bt_off": {t: "$$mdi:bluetooth-off$$"}
    "&usb_on": "$$mdi:usb$$"
    "&kp LA(F4)": "вң•"
    "&ext_power EP_TOG": "PwrВұ"
    "&ext_power EP_ON": "Pwr+"

draw_config:
  dark_mode: true
  n_columns: 1
  append_style: |
    svg { background-color: #1a1b26; }
    rect.key { fill: #24283b; stroke: #414868; }
    text { fill: #c0caf5; }
    rect.held { fill: #f7768e; }
    rect.ghost { 
      fill: #000000 !important; 
      stroke: #1a1b26 !important; 
    }
    /* Optional: Auch den Text auf Ghost-Tasten dunkler machen */
    .ghost text { fill: #414868 !important; }
    


