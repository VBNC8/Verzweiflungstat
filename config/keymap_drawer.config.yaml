draw_config:
  dark_mode: true
  n_columns: 1
  svg_style: |
    /* Hauptbuchstaben moderat vergrГ¶Гҹern */
    text.key:not(.side) {
      font-size: 15px !important;
      font-weight: 500;
    }

    /* Side Legends (hoch/tief) klein halten, damit sie nicht wandern */
    text.side {
      font-size: 8px !important;
      fill: #b0b0b0 !important;
    }

    /* Spezielle Korrektur fГјr die Combo-Kiste (RGB) */
    /* Wir zentrieren den Text innerhalb der Combo-Gruppe */
    g.combo text {
      font-size: 10px !important;
      transform: translateY(2px); /* Schiebt das Wort 'RGB' manuell in die Mitte der Box */
      font-weight: bold;
    }
    
    /* Die roten 'held' Tasten besser lesbar machen */
    rect.held + text {
      font-size: 11px !important;
      fill: #ffffff !important;
    }


