# Kabelgebundener Split-Betrieb (Wired)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_SERIAL=y

# Kommunikation über UART (GP4 TX / GP5 RX)
CONFIG_ZMK_USB=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Strom sparen (optional, aber gut für die Hitzeentwicklung des RP2040)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Onboard-LED (GP25) als Power-Heartbeat (1 Hz) und Aktivitäts-Indikator (100 ms flash)
CONFIG_HEARTBEAT_LED=y
