# Standalone left-half mode – single controller, no split communication.
# All 21 left-side keys are fully functional over USB.
#
# To use wired split (both halves), switch to the
#   handwired_left  and  handwired_right  shields instead.

# No split in standalone mode
CONFIG_ZMK_SPLIT=n

# USB HID – keyboard appears as USB device
CONFIG_ZMK_USB=y

# Serial driver present (needed if you later enable split UART)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Screen-off / idle after 30 s (reduces RP2040 temperature)
CONFIG_ZMK_IDLE_TIMEOUT=30000
