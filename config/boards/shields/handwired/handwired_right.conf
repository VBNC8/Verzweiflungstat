# Right half – peripheral (slave)
# Wired UART split, no USB HID

# Split transport
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n

# Wired UART – interrupt mode for peripheral TX (polling unreliable for TX on RP2040)
CONFIG_SERIAL=y
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_INTERRUPT=y
CONFIG_UART_CONSOLE=n

# No USB HID on the peripheral (reflash via UF2 bootloader)
CONFIG_ZMK_USB=n

# EC11 rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Keymap sensor support
CONFIG_ZMK_KEYMAP_SENSORS=y

# Mouse / pointer
CONFIG_ZMK_POINTING=y

# Comfortable idle timeout
CONFIG_ZMK_IDLE_TIMEOUT=30000

# WS2812 NeoPixel onboard (GP16) via PIO
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
