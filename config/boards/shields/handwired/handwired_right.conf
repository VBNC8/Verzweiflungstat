# Right half – peripheral (slave)
# Wired UART split, no USB HID

# Split transport
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n

# Wired UART – polling mode
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_POLLING=y

# No USB HID on the peripheral (reflash via UF2 bootloader)
CONFIG_ZMK_USB=n

# EC11 rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Keymap sensor support
CONFIG_ZMK_KEYMAP_SENSORS=y

# Mouse / pointer
CONFIG_ZMK_POINTING=y
