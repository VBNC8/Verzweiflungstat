# Kabelgebundener Split-Betrieb (Wired) — Rechte Seite (Peripheral)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n

# Rechte Seite = Peripheral: sendet Key-Events über UART (GP14 TX / GP15 RX) an die
# linke Seite (Central). Kein USB HID nötig.
CONFIG_ZMK_USB=n
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_ZMK_IDLE_TIMEOUT=30000
