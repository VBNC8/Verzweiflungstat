# Kabelgebundener Split-Betrieb (Wired) — Rechte Seite (Peripheral)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n

# Rechte Seite = Peripheral: sendet Key-Events über UART (GP4 TX / GP5 RX) an die
# linke Seite (Central). UART-Transport aktiviert sich durch zmk,split-uart chosen.
CONFIG_ZMK_USB=n
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_ZMK_IDLE_TIMEOUT=30000

# WS2812 NeoPixel onboard (GP16) via PIO — kein WS2812_STRIP nötig (PIO-Treiber)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_LED_STRIP=y
