# Kabelgebundener Split-Betrieb (Wired) — Linke Seite (Central)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n

# Linke Seite = Central: verbindet sich per USB mit dem PC und empfängt
# Events von der rechten Seite (Peripheral) über UART (GP8/GP9)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

CONFIG_ZMK_USB=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_ZMK_IDLE_TIMEOUT=30000
