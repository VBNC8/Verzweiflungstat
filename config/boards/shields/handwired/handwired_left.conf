# Kabelgebundener Split-Betrieb (Wired) — Linke Seite (Central)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n

# Linke Seite = Central: verbindet sich per USB mit dem PC und empfängt
# Events von der rechten Seite (Peripheral) über UART (GP8/GP9)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

CONFIG_ZMK_USB=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_ZMK_IDLE_TIMEOUT=30000

# ── nice!view Display (Sharp LS0xx via SPI0) ─────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# Battery widget: shows charge level when a wireless setup is used.
# On a wired-only build it does no harm but will read 0 %.
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y

# ── EC11 rotary encoder ──────────────────────────────────────────────────
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
