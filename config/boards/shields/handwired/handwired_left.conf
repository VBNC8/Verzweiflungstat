# Wired split – LEFT HALF (central, USB-connected)
#
# The left side is the central: it communicates with the host over USB
# and receives right-half key events from the peripheral via UART.

CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# USB HID
CONFIG_ZMK_USB=y

# UART serial transport for wired split
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Idle timeout (30 s)
CONFIG_ZMK_IDLE_TIMEOUT=30000
