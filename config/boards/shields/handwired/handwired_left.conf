# Left half – central (master)
# Wired UART split, USB HID output

# Split transport
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Wired UART – polling mode (interrupt mode unreliable on RP2040 PL011)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_POLLING=y

# USB HID output on the central side
CONFIG_ZMK_USB=y

# EC11 rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Keymap sensor support (encoder bindings per layer)
CONFIG_ZMK_KEYMAP_SENSORS=y

# Mouse / pointer (mkp, msc)
CONFIG_ZMK_POINTING=y

# Comfortable idle timeout
CONFIG_ZMK_IDLE_TIMEOUT=30000
