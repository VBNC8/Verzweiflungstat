# Kabelgebundener Split-Betrieb (Wired) — Linke Seite (Central)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=n

# Linke Seite = Central: verbindet sich per USB mit dem PC und empfängt
# Events von der rechten Seite (Peripheral) über UART (GP4 TX / GP5 RX)
# UART-Transport wird automatisch durch den zmk,split-uart chosen-Knoten aktiviert
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

CONFIG_ZMK_USB=y
CONFIG_SERIAL=y
CONFIG_ZMK_SPLIT_WIRED_UART_MODE_POLLING=y
CONFIG_UART_CONSOLE=n

CONFIG_ZMK_IDLE_TIMEOUT=30000

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Pointing (für mkp/msc-Bindings im Keymap)
CONFIG_ZMK_POINTING=y

# WS2812 NeoPixel onboard (GP16) via PIO — kein WS2812_STRIP nötig (PIO-Treiber)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_LED_STRIP=y
# RP2040 WS2812 has no external power control GPIO; disable ZMK default that requires zmk,ext-power-generic DTS node
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
# LEDs off on startup; toggle/control via keymap
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
